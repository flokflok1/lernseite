name: ci-backend

on:
  pull_request:
  push:
    branches: [ master ]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Compile backend
        run: |
          cd backend
          python -m compileall app
