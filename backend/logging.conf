[loggers]
keys=root,app,gunicorn.error,gunicorn.access

[handlers]
keys=console,file,error_file,access_file

[formatters]
keys=generic,access

[logger_root]
level=INFO
handlers=console,file

[logger_app]
level=INFO
handlers=console,file,error_file
qualname=app
propagate=0

[logger_gunicorn.error]
level=INFO
handlers=console,error_file
propagate=0
qualname=gunicorn.error

[logger_gunicorn.access]
level=INFO
handlers=access_file
propagate=0
qualname=gunicorn.access

[handler_console]
class=StreamHandler
formatter=generic
args=(sys.stdout,)

[handler_file]
class=logging.handlers.RotatingFileHandler
formatter=generic
args=('/var/log/lsx/backend.log', 'a', 10485760, 5, 'utf-8')

[handler_error_file]
class=logging.handlers.RotatingFileHandler
formatter=generic
level=ERROR
args=('/var/log/lsx/error.log', 'a', 10485760, 5, 'utf-8')

[handler_access_file]
class=logging.handlers.RotatingFileHandler
formatter=access
args=('/var/log/lsx/access.log', 'a', 10485760, 5, 'utf-8')

[formatter_generic]
format=%(asctime)s [%(process)d] [%(levelname)s] [%(name)s] %(message)s
datefmt=%Y-%m-%d %H:%M:%S %z
class=logging.Formatter

[formatter_access]
format=%(message)s
class=logging.Formatter
