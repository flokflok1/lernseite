services:
  frontend:
    image: nginx:alpine
    container_name: lsx-frontend
    restart: unless-stopped
    dns: []
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      macvlan50:
        ipv4_address: 10.0.50.4
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: lsx-backend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ../backend:/app
      - /opt/docker-data/lsx/uploads:/app/uploads
      - /opt/docker-data/lsx/logs:/app/logs
      - "../AP 1:/exam-data/AP 1:ro"
      - ../AP2:/exam-data/AP2:ro
      - /usr/bin/pdftoppm:/usr/local/bin/pdftoppm:ro
      - /usr/bin/pdfinfo:/usr/local/bin/pdfinfo:ro
      - /usr/lib/x86_64-linux-gnu:/usr/lib/host-libs:ro
    working_dir: /app
    environment:
      - DOCKER=1
      - GUNICORN_WORKER_CLASS=eventlet
      - LD_LIBRARY_PATH=/usr/lib/host-libs
    networks:
      macvlan51:
        ipv4_address: 10.0.51.4
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: lsx-celery
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ../backend:/app
      - /opt/docker-data/lsx/uploads:/app/uploads
      - /opt/docker-data/lsx/logs:/app/logs
      - "../AP 1:/exam-data/AP 1:ro"
      - ../AP2:/exam-data/AP2:ro
      - /usr/bin/pdftoppm:/usr/local/bin/pdftoppm:ro
      - /usr/bin/pdfinfo:/usr/local/bin/pdfinfo:ro
      - /usr/lib/x86_64-linux-gnu:/usr/lib/host-libs:ro
    working_dir: /app
    environment:
      - DOCKER=1
      - LD_LIBRARY_PATH=/usr/lib/host-libs
    command: celery -A celery_worker:celery worker --pool=prefork --concurrency=4 --loglevel=info
    networks:
      macvlan53:
        ipv4_address: 10.0.53.3

networks:
  macvlan50:
    external: true
  macvlan51:
    external: true
  macvlan53:
    external: true
