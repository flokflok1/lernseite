<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <!-- Skin gradient -->
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd5c0"/>
      <stop offset="100%" style="stop-color:#e8b89a"/>
    </linearGradient>
    <!-- Hair gradient -->
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3728"/>
      <stop offset="100%" style="stop-color:#2d1f16"/>
    </linearGradient>
    <!-- Vest gradient -->
    <linearGradient id="vestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4d3b"/>
      <stop offset="100%" style="stop-color:#6b3a2d"/>
    </linearGradient>
    <!-- Shirt gradient -->
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ba3c7"/>
      <stop offset="100%" style="stop-color:#4a8eb5"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <!-- Soft shadow for face -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Body/Torso -->
  <g filter="url(#shadow)">
    <!-- Shirt -->
    <path d="M140 280 Q200 260 260 280 L280 450 Q200 470 120 450 Z" fill="url(#shirtGrad)"/>
    <!-- Shirt collar -->
    <path d="M160 280 L200 320 L240 280" fill="none" stroke="#4a8eb5" stroke-width="3"/>
    <!-- Vest -->
    <path d="M145 290 L145 440 Q170 450 200 450 Q230 450 255 440 L255 290 Q230 300 200 310 Q170 300 145 290" fill="url(#vestGrad)"/>
    <!-- Vest buttons -->
    <circle cx="200" cy="340" r="5" fill="#5a3a2a"/>
    <circle cx="200" cy="380" r="5" fill="#5a3a2a"/>
    <circle cx="200" cy="420" r="5" fill="#5a3a2a"/>
  </g>

  <!-- Arms -->
  <g filter="url(#shadow)">
    <!-- Left arm (shirt) -->
    <path d="M140 290 Q100 320 90 380 Q85 400 95 420" fill="url(#shirtGrad)" stroke="#4a8eb5" stroke-width="2"/>
    <!-- Left hand -->
    <ellipse cx="95" cy="430" rx="22" ry="28" fill="url(#skinGrad)"/>
    <!-- Left fingers -->
    <path d="M80 415 Q70 410 68 420 Q66 430 75 432" fill="url(#skinGrad)"/>
    <path d="M75 420 Q65 418 63 428 Q61 438 72 438" fill="url(#skinGrad)"/>

    <!-- Right arm (shirt) -->
    <path d="M260 290 Q300 320 310 380 Q315 400 305 420" fill="url(#shirtGrad)" stroke="#4a8eb5" stroke-width="2"/>
    <!-- Right hand -->
    <ellipse cx="305" cy="430" rx="22" ry="28" fill="url(#skinGrad)"/>
    <!-- Right fingers -->
    <path d="M320 415 Q330 410 332 420 Q334 430 325 432" fill="url(#skinGrad)"/>
    <path d="M325 420 Q335 418 337 428 Q339 438 328 438" fill="url(#skinGrad)"/>
  </g>

  <!-- Neck -->
  <ellipse cx="200" cy="265" rx="30" ry="25" fill="url(#skinGrad)"/>

  <!-- Head -->
  <g filter="url(#softShadow)">
    <!-- Head shape -->
    <ellipse cx="200" cy="150" rx="85" ry="100" fill="url(#skinGrad)"/>

    <!-- Ears -->
    <ellipse cx="110" cy="160" rx="18" ry="25" fill="url(#skinGrad)"/>
    <ellipse cx="113" cy="160" rx="10" ry="15" fill="#e8a890"/>
    <ellipse cx="290" cy="160" rx="18" ry="25" fill="url(#skinGrad)"/>
    <ellipse cx="287" cy="160" rx="10" ry="15" fill="#e8a890"/>

    <!-- Hair -->
    <path d="M115 130 Q115 50 200 40 Q285 50 285 130 Q280 80 200 70 Q120 80 115 130" fill="url(#hairGrad)"/>
    <path d="M125 130 Q130 100 160 90" fill="url(#hairGrad)" stroke="url(#hairGrad)" stroke-width="15" stroke-linecap="round"/>
    <path d="M275 130 Q270 100 240 90" fill="url(#hairGrad)" stroke="url(#hairGrad)" stroke-width="15" stroke-linecap="round"/>
    <!-- Hair detail/texture -->
    <path d="M150 60 Q170 55 200 55 Q230 55 250 60" fill="none" stroke="#3a2a1a" stroke-width="3" opacity="0.3"/>

    <!-- Beard -->
    <path d="M145 190 Q150 240 200 260 Q250 240 255 190" fill="url(#hairGrad)" opacity="0.9"/>
    <path d="M150 200 Q155 235 200 250 Q245 235 250 200" fill="url(#hairGrad)"/>
    <!-- Mustache -->
    <path d="M160 185 Q180 195 200 190 Q220 195 240 185" fill="url(#hairGrad)" stroke="url(#hairGrad)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Face features -->
  <g>
    <!-- Eyebrows -->
    <path d="M145 110 Q165 100 185 108" fill="none" stroke="#3a2a1a" stroke-width="5" stroke-linecap="round"/>
    <path d="M215 108 Q235 100 255 110" fill="none" stroke="#3a2a1a" stroke-width="5" stroke-linecap="round"/>

    <!-- Eyes (white) -->
    <ellipse cx="165" cy="135" rx="22" ry="18" fill="white"/>
    <ellipse cx="235" cy="135" rx="22" ry="18" fill="white"/>

    <!-- Iris -->
    <circle cx="165" cy="137" r="12" fill="#5a4030"/>
    <circle cx="235" cy="137" r="12" fill="#5a4030"/>

    <!-- Pupils -->
    <circle cx="165" cy="137" r="6" fill="#1a1a1a"/>
    <circle cx="235" cy="137" r="6" fill="#1a1a1a"/>

    <!-- Eye shine -->
    <circle cx="160" cy="133" r="4" fill="white" opacity="0.8"/>
    <circle cx="230" cy="133" r="4" fill="white" opacity="0.8"/>
    <circle cx="168" cy="140" r="2" fill="white" opacity="0.5"/>
    <circle cx="238" cy="140" r="2" fill="white" opacity="0.5"/>

    <!-- Glasses -->
    <rect x="135" y="118" width="60" height="40" rx="8" fill="none" stroke="#2a2a2a" stroke-width="4"/>
    <rect x="205" y="118" width="60" height="40" rx="8" fill="none" stroke="#2a2a2a" stroke-width="4"/>
    <path d="M195 135 L205 135" stroke="#2a2a2a" stroke-width="4"/>
    <path d="M135 135 L110 130" stroke="#2a2a2a" stroke-width="3"/>
    <path d="M265 135 L290 130" stroke="#2a2a2a" stroke-width="3"/>

    <!-- Nose -->
    <path d="M200 140 Q195 165 200 175 Q210 178 215 172" fill="none" stroke="#d4a088" stroke-width="3" stroke-linecap="round"/>

    <!-- Mouth (friendly smile) -->
    <path d="M175 210 Q200 225 225 210" fill="none" stroke="#8b5a5a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Watch on left wrist -->
  <rect x="78" cy="408" width="20" height="25" rx="3" fill="#3a3a3a"/>
  <rect x="82" cy="412" width="12" height="17" rx="2" fill="#1a3a4a"/>
</svg>