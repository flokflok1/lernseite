<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Skin gradient for realistic skin tone -->
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4d4"/>
      <stop offset="100%" style="stop-color:#e8c4a8"/>
    </linearGradient>

    <!-- Hair gradient -->
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3728"/>
      <stop offset="100%" style="stop-color:#2d1f14"/>
    </linearGradient>

    <!-- Shirt gradient - professional blue -->
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>

    <!-- Glasses lens gradient -->
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>

    <!-- Soft shadow for face features -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background circle - dark professional look -->
  <circle cx="100" cy="100" r="95" fill="#1e293b" filter="url(#shadow)"/>
  <circle cx="100" cy="100" r="90" fill="#334155"/>

  <!-- Inner ring accent -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#475569" stroke-width="1"/>

  <!-- Shoulders/Shirt -->
  <ellipse cx="100" cy="190" rx="75" ry="50" fill="url(#shirtGrad)"/>
  <ellipse cx="100" cy="185" rx="60" ry="40" fill="url(#shirtGrad)"/>

  <!-- Shirt collar V-neck -->
  <path d="M 80 155 L 100 175 L 120 155" fill="none" stroke="#1e40af" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tie -->
  <path d="M 100 165 L 96 175 L 100 195 L 104 175 Z" fill="#1e40af"/>
  <path d="M 95 165 L 100 170 L 105 165 L 100 158 Z" fill="#1e40af"/>

  <!-- Neck -->
  <rect x="85" y="130" width="30" height="35" rx="8" fill="url(#skinGrad)"/>
  <!-- Neck shadow -->
  <ellipse cx="100" cy="155" rx="15" ry="5" fill="rgba(0,0,0,0.05)"/>

  <!-- Face - slightly oval -->
  <ellipse cx="100" cy="95" rx="50" ry="58" fill="url(#skinGrad)" filter="url(#softShadow)"/>

  <!-- Jaw line shadow -->
  <path d="M 55 110 Q 70 145 100 150 Q 130 145 145 110" fill="none" stroke="rgba(200,160,120,0.3)" stroke-width="3"/>

  <!-- Hair - styled -->
  <ellipse cx="100" cy="52" rx="54" ry="38" fill="url(#hairGrad)"/>
  <path d="M 46 70 Q 42 45 58 35 Q 85 22 100 26 Q 115 22 142 35 Q 158 45 154 70 Q 138 50 100 46 Q 62 50 46 70" fill="url(#hairGrad)"/>

  <!-- Hair highlights -->
  <path d="M 65 45 Q 85 35 105 40" fill="none" stroke="rgba(100,80,60,0.4)" stroke-width="8" stroke-linecap="round"/>

  <!-- Side hair/sideburns -->
  <ellipse cx="50" cy="88" rx="8" ry="22" fill="url(#hairGrad)"/>
  <ellipse cx="150" cy="88" rx="8" ry="22" fill="url(#hairGrad)"/>

  <!-- Ears -->
  <ellipse cx="50" cy="95" rx="9" ry="14" fill="url(#skinGrad)"/>
  <ellipse cx="150" cy="95" rx="9" ry="14" fill="url(#skinGrad)"/>
  <!-- Inner ear detail -->
  <ellipse cx="51" cy="95" rx="5" ry="9" fill="rgba(200,160,120,0.3)"/>
  <ellipse cx="149" cy="95" rx="5" ry="9" fill="rgba(200,160,120,0.3)"/>

  <!-- Eyebrows - slightly raised, friendly -->
  <path d="M 68 73 Q 78 68 90 73" fill="none" stroke="#3d2914" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 110 73 Q 122 68 132 73" fill="none" stroke="#3d2914" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Eye whites -->
  <ellipse cx="79" cy="90" rx="14" ry="11" fill="white"/>
  <ellipse cx="121" cy="90" rx="14" ry="11" fill="white"/>

  <!-- Iris (dark blue/brown) -->
  <circle cx="81" cy="90" r="7" fill="#2d3748"/>
  <circle cx="123" cy="90" r="7" fill="#2d3748"/>

  <!-- Pupils -->
  <circle cx="82" cy="90" r="4" fill="#1a1a2e"/>
  <circle cx="124" cy="90" r="4" fill="#1a1a2e"/>

  <!-- Eye highlights (sparkle) -->
  <circle cx="84" cy="87" r="2.5" fill="white"/>
  <circle cx="126" cy="87" r="2.5" fill="white"/>
  <circle cx="79" cy="92" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="121" cy="92" r="1" fill="rgba(255,255,255,0.5)"/>

  <!-- Eyelids (subtle) -->
  <path d="M 65 88 Q 79 82 93 88" fill="none" stroke="rgba(60,40,20,0.2)" stroke-width="2"/>
  <path d="M 107 88 Q 121 82 135 88" fill="none" stroke="rgba(60,40,20,0.2)" stroke-width="2"/>

  <!-- Nose - refined -->
  <path d="M 100 92 Q 103 102 100 112" fill="none" stroke="#d4a574" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 95 115 Q 100 118 105 115" fill="none" stroke="#d4a574" stroke-width="2" stroke-linecap="round"/>

  <!-- Mouth - warm friendly smile -->
  <path d="M 84 128 Q 92 138 100 138 Q 108 138 116 128" fill="none" stroke="#c17a5a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Upper lip detail -->
  <path d="M 90 128 Q 100 125 110 128" fill="none" stroke="rgba(180,120,100,0.5)" stroke-width="1.5"/>

  <!-- Dimples -->
  <circle cx="82" cy="130" r="2" fill="rgba(200,150,130,0.3)"/>
  <circle cx="118" cy="130" r="2" fill="rgba(200,150,130,0.3)"/>

  <!-- Glasses frames - modern rectangular -->
  <rect x="60" y="80" width="34" height="24" rx="5" fill="url(#lensGrad)" stroke="#374151" stroke-width="3"/>
  <rect x="106" y="80" width="34" height="24" rx="5" fill="url(#lensGrad)" stroke="#374151" stroke-width="3"/>

  <!-- Glasses bridge -->
  <path d="M 94 90 L 106 90" stroke="#374151" stroke-width="2.5"/>

  <!-- Glasses temples (arms) -->
  <path d="M 60 88 L 50 85" stroke="#374151" stroke-width="2.5"/>
  <path d="M 140 88 L 150 85" stroke="#374151" stroke-width="2.5"/>

  <!-- Glasses nose pads -->
  <circle cx="90" cy="96" r="2" fill="#374151"/>
  <circle cx="110" cy="96" r="2" fill="#374151"/>

  <!-- Cheek blush (subtle) -->
  <ellipse cx="68" cy="108" rx="10" ry="6" fill="rgba(255,180,180,0.15)"/>
  <ellipse cx="132" cy="108" rx="10" ry="6" fill="rgba(255,180,180,0.15)"/>
</svg>